<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="" />
  </head>
  <body>
    <div>
      <h1 class="guessthenumber">Guess the number</h1>
      <label for="">Enter your number here</label>
      <input type="text" name="" value="" id="inputnumber" />
      <button type="button" onclick="guessthenumber()">Submit</button>

      <div>
        <p id="sucessnumber"></p>
        <p id="failurenumber"></p>
      </div>
    </div>
    <script>
      function guessthenumber() {
        let randomnumber = Math.floor(Math.random() * 101);

        let userguessnumber = document.getElementById("inputnumber").value;
        let sucessnum = document.getElementById("sucessnumber");
        let failurenum = document.getElementById("failurenumber");

        if (randomnumber == userguessnumber) {
          sucessnum.innerText = `You have guessed corretly  Your number:${userguessnumber} and Random Number: ${randomnumber}`;
        } else {
          failurenum.innerText = `You have guessed incorretly  Your number:${userguessnumber} and Random Number: ${randomnumber}`;
        }
      }
    </script>
  </body>
</html>
