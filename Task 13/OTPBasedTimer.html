<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="" />
  </head>
  <body>
    <div>
      <h1>OTP</h1>
      <p id="otp"></p>
      <p id="timer"></p>
      <button type="button" onclick="sendOTP()">Send OTP</button>
      <button type="button" onclick="resendOTP()">Resend OTP</button>
    </div>

    <script>
      let timer = 10;
      let timerInterval;
      function sendOTP() {
        let otpDisplay = document.getElementById("otp");
        let otp = Math.floor(1000 + Math.random() * 9000);
        otpDisplay.innerText = otp;

        let timerDisplay = document.getElementById("timer");
        let timerout = setInterval(() => {
          timerInterval = timerout;
          timerDisplay.innerText = timer;
          if (timer == 0) {
            timerDisplay.innerText = "OTP Expired";
            clearInterval(timerout);
          }
          timer--;
        }, 1000);
      }
      function resendOTP() {
        clearInterval(timerInterval);
        timer = 10;
        sendOTP();
      }
    </script>
  </body>
</html>
