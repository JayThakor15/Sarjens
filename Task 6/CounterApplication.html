<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Counter</title>

    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 20%;
        background-color: #f4f6f8;
      }

      div {
        text-align: center;
        background: white;
        padding: 30px 40px;
        border-radius: 10px;
        border: 1px solid black;
      }

      #counter {
        font-size: 48px;
        margin: 20px 0;
        font-weight: bold;
      }

      button {
        padding: 10px 18px;
        margin: 5px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        border: 1px solid black;
      }
    </style>

    <script>
      var localVariable = localStorage.getItem("countValue");
      if (localVariable == 0) {
        var count = 0;
      } else {
        count = localStorage.getItem("countValue");
      }
      function Increment() {
        count++;
        localStorage.setItem("countValue", count);
        var counter = document.getElementById("counter");
        counter.innerText = localStorage.getItem("countValue");
      }
      function Decrement() {
        if (count == 0) {
          return;
        }
        count--;
        localStorage.setItem("countValue", count);
        var counter = document.getElementById("counter");
        counter.innerText = localStorage.getItem("countValue");
      }
      function Reset() {
        count = 0;
        localStorage.setItem("countValue", count);
        var counter = document.getElementById("counter");
        counter.innerText = localStorage.getItem("countValue");
      }
    </script>
  </head>

  <body>
    <div >
      <h1>Counter</h1>
      <p id="counter"></p>
      <button onclick="Increment()">Increment</button>
      <button onclick="Decrement()">Decrement</button>
      <button onclick="Reset()">Reset</button>
    </div>
  </body>
</html>
